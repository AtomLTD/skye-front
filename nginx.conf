server {
    listen 80;
    server_name _;
    root /app;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Кэширование статических файлов
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Кэширование изображений
    location ~* \.(png|jpg|jpeg|gif|ico|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Кэширование CSS и JS
    location ~* \.(css|js)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}


